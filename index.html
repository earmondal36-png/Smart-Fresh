<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Fresh Premium</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{margin:0;font-family:'Segoe UI';background:#f5f7fb}

/* LOGIN */
.login{
display:flex;justify-content:center;align-items:center;height:100vh;
background:linear-gradient(135deg,#4f46e5,#6366f1);
}
.login-card{
background:#fff;padding:30px;border-radius:12px;width:320px;
text-align:center;box-shadow:0 10px 25px rgba(0,0,0,0.2);
}
.login-card input,select{
width:90%;padding:10px;margin:8px;border:1px solid #ccc;border-radius:6px;
}
.login-card button{
width:95%;padding:10px;background:#4f46e5;color:#fff;border:none;border-radius:6px;
}

/* SIDEBAR */
.sidebar{
width:220px;height:100vh;background:#1e293b;color:#fff;position:fixed;padding:20px;
}

/* TOPBAR */
.topbar{
margin-left:220px;height:60px;background:#fff;display:flex;
justify-content:flex-end;align-items:center;padding:0 20px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
gap:20px;
position:relative;
}

/* MAIN */
.main{margin-left:220px;padding:20px}

/* TABLE */
table{width:100%;border-collapse:collapse;background:#fff}
th,td{padding:12px;border-bottom:1px solid #ddd;text-align:center}
th{background:#4f46e5;color:#fff}

/* BUTTON */
button{padding:8px 12px;background:#4f46e5;color:#fff;border:none;border-radius:6px}

/* MENU */
.menu{
display:none;position:absolute;right:10px;top:50px;
background:#fff;border:1px solid #ccc;border-radius:6px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
.menu div{padding:10px;cursor:pointer}
.menu div:hover{background:#eee}

/* NOTIFICATION */
.notif-box{
display:none;position:absolute;right:60px;top:50px;
background:#fff;width:250px;border:1px solid #ccc;border-radius:6px;
max-height:300px;overflow:auto;
}
.notif-box div{padding:10px;border-bottom:1px solid #eee}

/* EMP */
.emp{text-align:center;padding:20px}
.big{width:80%;margin:10px;padding:12px;background:#10b981}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="login">
<div class="login-card">
<h2>Smart Fresh</h2>

<select id="role">
<option value="admin">Admin</option>
<option value="employee">Employee</option>
</select>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>
</div>
</div>

<!-- ADMIN -->
<div id="adminPanel" style="display:none">

<div class="sidebar">
<h2>Smart Fresh</h2>
<div onclick="tab('home')">Home</div>
<div onclick="tab('attendance')">Attendance</div>
<div onclick="tab('work')">Work</div>
<div onclick="tab('salary')">Salary</div>
<div onclick="tab('notif')">Notifications</div>
</div>

<!-- TOPBAR -->
<div class="topbar">

<!-- BELL -->
<div onclick="toggleNotif()">🔔</div>

<!-- 3 DASH -->
<div onclick="toggleMenu()">☰</div>

<div id="menu" class="menu">
<div onclick="addEmp()">Add Employee</div>
<div onclick="logout()">Logout</div>
</div>

<div id="notifBox" class="notif-box"></div>

</div>

<div class="main">

<!-- HOME -->
<div id="home">
<table>
<tr>
<th>ID</th><th>Name</th><th>Post</th><th>Contact</th>
</tr>
<tbody id="homeTable"></tbody>
</table>
</div>

<!-- ATT -->
<div id="attendance" style="display:none">
<table>
<tr><th>ID</th><th>Name</th><th>Presents</th><th>Leaves</th></tr>
<tbody id="attTable"></tbody>
</table>
</div>

<!-- WORK -->
<div id="work" style="display:none">
<table>
<tr><th>ID</th><th>Name</th><th>Work</th><th>Late</th><th>OT</th></tr>
<tbody id="workTable"></tbody>
</table>
</div>

<!-- SALARY -->
<div id="salary" style="display:none">
<table>
<tr><th>ID</th><th>Name</th><th>Salary</th></tr>
<tbody id="salTable"></tbody>
</table>
</div>

</div>
</div>

<!-- EMPLOYEE -->
<div id="empPanel" style="display:none" class="emp">
<h2 id="welcome"></h2>

<select id="shift">
<option value="1">Shift 1</option>
<option value="2">Shift 2</option>
<option value="3">Shift 3</option>
<option value="4">Shift 4</option>
</select>

<button class="big" onclick="checkIn()">Check In</button>
<button class="big" onclick="checkOut()">Check Out</button>

<textarea id="leave"></textarea>
<button onclick="sendLeave()">Apply Leave</button>

<textarea id="issue"></textarea>
<button onclick="sendIssue()">Send Issue</button>

<button onclick="logout()">Logout</button>
</div>

<script>

/* FIREBASE */
const firebaseConfig={
apiKey:"YOUR_KEY",
authDomain:"smart-fresh-eb255.firebaseapp.com",
projectId:"smart-fresh-eb255"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

let currentUser,checkInTime;

/* LOGIN */
async function login(){
let r=role.value,u=username.value,p=password.value;

if(r==="admin" && u==="admin" && p==="1234"){
loginPage.style.display="none";
adminPanel.style.display="block";
load();
}

if(r==="employee"){
let snap=await db.collection("employees").get();
snap.forEach(d=>{
let e=d.data();
if(e.contact===u && e.password===p){
currentUser=e;
loginPage.style.display="none";
empPanel.style.display="block";
welcome.innerText="Welcome "+e.name;
}
});
}
}

/* MENU */
function toggleMenu(){
menu.style.display=menu.style.display==="block"?"none":"block";
}

/* NOTIF */
function toggleNotif(){
notifBox.style.display=notifBox.style.display==="block"?"none":"block";
loadNotif();
}

async function loadNotif(){
let n="";
let snap=await db.collection("notifications").get();
snap.forEach(d=>{
let x=d.data();
n+=`<div>${x.type} : ${x.text}</div>`;
});
notifBox.innerHTML=n;
}

/* SHIFT */
function getShift(s){
if(s=="1")return{start:480,end:690};
if(s=="2")return{start:690,end:900};
if(s=="3")return{start:900,end:1110};
if(s=="4")return{start:1110,end:1320};
}

function now(){let d=new Date();return d.getHours()*60+d.getMinutes();}

/* CHECK */
function checkIn(){checkInTime=now();alert("In");}
async function checkOut(){
let t=getShift(shift.value);
let out=now();

let work=(out-checkInTime)/60;
let late=Math.max(0,checkInTime-t.start);
let ot=Math.max(0,out-t.end);

await db.collection("attendance").add({
empId:currentUser.id,name:currentUser.name,work,late,ot
});
alert("Saved");
}

/* ADD */
async function addEmp(){
let n=prompt("Name");
let c=prompt("Contact");
let p=prompt("Post");
let id=n[0]+Date.now();

await db.collection("employees").doc(id).set({
id,name:n,contact:c,post:p,password:c
});
load();
}

/* LOAD */
async function load(){

let h="",att={},w="",sal={};

let emp=await db.collection("employees").get();
emp.forEach(d=>{
let e=d.data();
h+=`<tr><td>${e.id}</td><td>${e.name}</td><td>${e.post}</td><td>${e.contact}</td></tr>`;
att[e.id]={name:e.name,days:0};
});

let at=await db.collection("attendance").get();
at.forEach(d=>{
let a=d.data();
att[a.empId].days++;

w+=`<tr><td>${a.empId}</td><td>${a.name}</td><td>${a.work.toFixed(2)}</td><td>${a.late}</td><td>${a.ot}</td></tr>`;
sal[a.empId]=(sal[a.empId]||0)+a.work*100;
});

let ahtml="",shtml="";
for(let i in att){
ahtml+=`<tr><td>${i}</td><td>${att[i].name}</td><td>${att[i].days}</td><td>${30-att[i].days}</td></tr>`;
}
for(let i in sal){
shtml+=`<tr><td>${i}</td><td>${att[i].name}</td><td>${sal[i]}</td></tr>`;
}

homeTable.innerHTML=h;
attTable.innerHTML=ahtml;
workTable.innerHTML=w;
salTable.innerHTML=shtml;
}

/* LEAVE */
function sendLeave(){
db.collection("notifications").add({type:"leave",text:leave.value});
alert("Sent");
}

/* ISSUE */
function sendIssue(){
db.collection("notifications").add({type:"issue",text:issue.value});
alert("Sent");
}

/* TAB */
function tab(t){
["home","attendance","work","salary"].forEach(x=>document.getElementById(x).style.display="none");
document.getElementById(t).style.display="block";
}

function logout(){location.reload();}

</script>

</body>
</html>
